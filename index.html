<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer Player Hub</title>
  <style>
    :root {
      --primary-bg: #f2fcf5;
      --primary-accent: #4f9d69;
      --primary-accent-soft: #dcf7e5;
      --card-bg: #ffffff;
      --text-main: #1f2933;
      --text-muted: #5f7368;
      --button-bg: #4f9d69;
      --button-bg-soft: #dcf7e5;
      --button-text: #133222;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--primary-bg);
      color: var(--text-main);
      min-height: 100svh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 16px;
    }

    .app-shell {
      width: 100%;
      max-width: 480px;
      min-height: calc(100svh - 32px);
      background: #ffffff;
      border-radius: 24px;
      border: 1px solid #cfe7d7;
      box-shadow: 0 12px 28px rgba(79,157,105,0.12);
      overflow: hidden;
    }

    .app-header {
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #d9f4e1;
      border-bottom: 1px solid #b8dfc5;
    }

    .app-logo {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: #b8e7c8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.9);
    }

    .app-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 2px 0;
    }

    .app-title-main {
      font-weight: 800;
      letter-spacing: 0.03em;
      font-size: 22px;
      line-height: 1;
      text-transform: uppercase;
      color: #1d4f33;
    }

    .app-title-sub {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #436253;
    }

    .app-body {
      padding: 16px 16px 20px;
      max-height: 80vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(79,157,105,0.45) transparent;
    }

    .app-body::-webkit-scrollbar { width: 6px; }
    .app-body::-webkit-scrollbar-thumb {
      background: rgba(79,157,105,0.45);
      border-radius: 999px;
    }

    .page-label {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .page-heading {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    .item-card {
      position: relative;
      background: var(--card-bg);
      border-radius: 14px;
      padding: 10px 10px 12px;
      border: 1px solid #d6e8dd;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    .item-card::before {
      content: none;
    }

    .item-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(79,157,105,0.14);
    }

    .item-card:hover::before { opacity: 0; }

    .item-icon-wrap {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      background: #ecf9f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin-bottom: 8px;
      box-shadow: none;
    }

    .item-icon-wrap--match {
      width: 100%;
      height: 52px;
      font-size: 24px;
      gap: 8px;
      justify-content: center;
    }

    .match-vs {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #3f5f4f;
    }

    .item-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .item-tagline {
      font-size: 11px;
      color: var(--text-muted);
    }

    .item-chip {
      position: absolute;
      right: 10px;
      top: 10px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 4px 7px;
      border-radius: 999px;
      background: #e8f6ed;
      color: #25613f;
      border: 1px solid #cbe8d6;
    }

    .pill-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .pill {
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      border: 1px solid #cfe7d7;
      color: var(--text-muted);
      background: #f8fdf9;
    }

    .pill--accent {
      border-color: #9bcfb0;
      color: #1f5f3d;
      background: #e8f6ed;
    }

    .detail-layout {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .detail-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .back-link {
      font-size: 11px;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      opacity: 0.85;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid #cfe7d7;
      background: #f5fcf7;
    }

    .back-link span:first-child {
      font-size: 14px;
      transform: translateY(1px);
    }

    .badge-soft {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      background: #e8f6ed;
      color: #1f5f3d;
    }

    .detail-hero {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .detail-icon {
      width: 90px;
      height: 90px;
      border-radius: 28px;
      background: #e8f6ed;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      box-shadow: none;
    }

    .detail-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .detail-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .detail-body {
      font-size: 13px;
      line-height: 1.5;
      color: #334155;
    }

    .detail-body-emoji {
      font-size: 16px;
      margin-right: 4px;
    }

    .info-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
      color: #334155;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #f6fbf8;
      border: 1px solid #deefe3;
    }

    .info-row strong {
      min-width: 120px;
      color: #365446;
    }

    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,0.18);
    }

    .match-meta {
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d6e8dd;
      background: #f6fbf8;
      font-size: 13px;
      color: #365446;
    }

    .match-meta strong {
      color: #1f5f3d;
    }

    .match-team-columns {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .team-panel {
      border: 1px solid #d6e8dd;
      border-radius: 12px;
      padding: 10px;
      background: #ffffff;
    }

    .team-panel-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1f5f3d;
    }

    .team-panel-subtitle {
      font-size: 12px;
      color: #4f6659;
      margin-bottom: 8px;
    }

    .player-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .player-link {
      width: 100%;
      border: 1px solid #deefe3;
      background: #f6fbf8;
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      text-align: left;
      color: #1f2933;
    }

    .player-link-left {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .player-link-meta {
      font-size: 11px;
      color: var(--text-muted);
    }

    .order-panel {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: radial-gradient(circle at top right, rgba(16,185,129,0.16), rgba(255,255,255,0.95));
      border: 1px solid rgba(34,197,94,0.25);
    }

    .order-button {
      width: 100%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: var(--button-text);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(34,197,94,0.28);
    }

    .order-button span:first-child { font-size: 22px; }

    .order-meta {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34,197,94,0.8);
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
      70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .status-banner {
      margin-top: 14px;
      padding: 10px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px dashed rgba(34,197,94,0.4);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1f2937;
    }

    .status-icon {
      font-size: 18px;
    }

    .status-label {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 10px;
      color: var(--text-muted);
    }

    .status-main {
      font-size: 12px;
    }

    .success-section {
      margin-top: 16px;
      padding: 18px 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(220,252,231,0.95), rgba(255,255,255,0.96));
      border: 1px solid rgba(34,197,94,0.28);
      box-shadow: 0 16px 30px rgba(34,197,94,0.12);
    }

    .success-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .success-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background: linear-gradient(135deg, #22c55e, #86efac);
      box-shadow: 0 12px 24px rgba(34,197,94,0.18);
    }

    .success-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #15803d;
      margin-bottom: 4px;
    }

    .success-title {
      font-size: 22px;
      font-weight: 800;
      color: #14532d;
      line-height: 1.1;
    }

    .success-message {
      font-size: 15px;
      line-height: 1.5;
      color: #166534;
    }

    .success-order-id {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(34,197,94,0.22);
      font-size: 14px;
      color: #166534;
    }

    .success-order-id strong {
      display: block;
      margin-top: 4px;
      font-size: 20px;
      letter-spacing: 0.08em;
      color: #14532d;
    }

    .success-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(34,197,94,0.2);
      font-size: 13px;
      color: #3f6212;
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
        justify-content: stretch;
      }
      .app-shell {
        max-width: 100%;
        min-height: 100svh;
        border-radius: 0;
        border: none;
      }
      .grid { grid-template-columns: 1fr; }
      .detail-hero { gap: 10px; }
      .detail-icon { width: 80px; height: 80px; font-size: 48px; }
      .app-title-main { font-size: 26px; }
      .app-title-sub { font-size: 12px; }
      .order-button { font-size: 17px; }
    }
  </style>
</head>

          { name: 'Bernardo Silva', favColor: 'Teal', avatar: '🏃', position: 'Midfielder', matchesPlayed: 25, goalsScored: 8, assists: 8, jerseyNumber: 20, age: 29, preferredFoot: 'Left' },
          { name: 'Rodri', favColor: 'Navy', avatar: '🏃', position: 'Midfielder', matchesPlayed: 28, goalsScored: 6, assists: 7, jerseyNumber: 16, age: 27, preferredFoot: 'Right' },
          { name: 'Jeremy Doku', favColor: 'Lime', avatar: '⚽', position: 'Forward', matchesPlayed: 22, goalsScored: 5, assists: 10, jerseyNumber: 11, age: 22, preferredFoot: 'Right' },
          { name: 'Ruben Dias', favColor: 'Cyan', avatar: '🧤', position: 'Defender', matchesPlayed: 24, goalsScored: 1, assists: 1, jerseyNumber: 3, age: 26, preferredFoot: 'Right' },
          { name: 'John Stones', favColor: 'Mint', avatar: '🧤', position: 'Defender', matchesPlayed: 20, goalsScored: 2, assists: 2, jerseyNumber: 5, age: 29, preferredFoot: 'Right' },
          { name: 'Josko Gvardiol', favColor: 'Indigo', avatar: '🧤', position: 'Defender', matchesPlayed: 23, goalsScored: 2, assists: 3, jerseyNumber: 24, age: 22, preferredFoot: 'Left' },
          { name: 'Kyle Walker', favColor: 'Yellow', avatar: '🧤', position: 'Defender', matchesPlayed: 22, goalsScored: 0, assists: 4, jerseyNumber: 2, age: 33, preferredFoot: 'Right' },
          { name: 'Ederson Moraes', favColor: 'Red', avatar: '🥅', position: 'Goalkeeper', matchesPlayed: 25, goalsScored: 0, assists: 1, jerseyNumber: 31, age: 30, preferredFoot: 'Left' }
        ]
      }
    ];

    const localConfigKey = 'soccerTeamsConfig';

    function normalizePlayer(player) {
      return {
        name: typeof player?.name === 'string' ? player.name : 'Unknown Player',
        favColor: typeof player?.favColor === 'string' ? player.favColor : 'Gray',
        avatar: typeof player?.avatar === 'string' ? player.avatar : '⚽',
        position: typeof player?.position === 'string' ? player.position : 'Midfielder',
        matchesPlayed: Number.isFinite(player?.matchesPlayed) ? player.matchesPlayed : 0,
        goalsScored: Number.isFinite(player?.goalsScored) ? player.goalsScored : 0,
        assists: Number.isFinite(player?.assists) ? player.assists : 0,
        jerseyNumber: Number.isFinite(player?.jerseyNumber) ? player.jerseyNumber : 0,
        age: Number.isFinite(player?.age) ? player.age : 0,
        preferredFoot: typeof player?.preferredFoot === 'string' ? player.preferredFoot : 'Right'
      };
    }

    function normalizeTeam(team, index) {
      const safePlayers = Array.isArray(team?.players) ? team.players.slice(0, 11).map(normalizePlayer) : [];
      return {
        id: typeof team?.id === 'string' ? team.id : `team-${index + 1}`,
        name: typeof team?.name === 'string' ? team.name : `Team ${index + 1}`,
        badge: typeof team?.badge === 'string' ? team.badge : '⚽',
        coach: typeof team?.coach === 'string' ? team.coach : 'Unknown Coach',
        players: safePlayers
      };
    }

    function loadTeamsData() {
      try {
        const raw = localStorage.getItem(localConfigKey);
        if (!raw) return defaultTeamsJson.map(normalizeTeam);

        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) || parsed.length !== 4) return defaultTeamsJson.map(normalizeTeam);

        const hasValidTeams = parsed.every(team =>
          team &&
          typeof team.name === 'string' &&
          typeof team.badge === 'string' &&
          Array.isArray(team.players) &&
          team.players.length >= 11
        );

        return hasValidTeams ? parsed.map(normalizeTeam) : defaultTeamsJson.map(normalizeTeam);
      } catch {
        return defaultTeamsJson.map(normalizeTeam);
      }
    }

    const teamsData = loadTeamsData();

    const matchesData = [
      {
        id: 'match-1',
        teamAId: teamsData[0]?.id,
        teamBId: teamsData[1]?.id,
        venue: 'BIMM Main Stadium',
        kickoff: '6:30 PM'
      },
      {
        id: 'match-2',
        teamAId: teamsData[2]?.id,
        teamBId: teamsData[3]?.id,
        venue: 'City Sports Arena',
        kickoff: '8:00 PM'
      },
      {
        id: 'match-3',
        teamAId: teamsData[0]?.id,
        teamBId: teamsData[2]?.id,
        venue: 'Greenfield Park',
        kickoff: '5:45 PM'
      },
      {
        id: 'match-4',
        teamAId: teamsData[1]?.id,
        teamBId: teamsData[3]?.id,
        venue: 'Riverfront Arena',
        kickoff: '7:15 PM'
      },
      {
        id: 'match-5',
        teamAId: teamsData[0]?.id,
        teamBId: teamsData[3]?.id,
        venue: 'North City Ground',
        kickoff: '9:00 PM'
      }
    ].filter(match => match.teamAId && match.teamBId);

    const matchesView = document.getElementById('list-view');
    const matchView = document.getElementById('match-view');
    const detailView = document.getElementById('detail-view');
    const matchesGrid = document.getElementById('items-grid');
    const matchHeading = document.getElementById('match-heading');
    const matchMeta = document.getElementById('match-meta');
    const matchTimeBadge = document.getElementById('match-time-badge');
    const matchTeamColumns = document.getElementById('match-team-columns');

    let currentMatchId = null;

    function makeCard({ icon, chip, name, tagline, onActivate, iconClass = '' }) {
      const card = document.createElement('article');
      card.className = 'item-card';
      card.tabIndex = 0;
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', `Open details for ${name}`);
      card.innerHTML = `
        <div class="item-icon-wrap ${iconClass}">${icon}</div>
        <div class="item-chip">${chip}</div>
        <div class="item-name">${name}</div>
        <div class="item-tagline">${tagline}</div>
      `;

      card.addEventListener('click', onActivate);
      card.addEventListener('keypress', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          onActivate();
        }
      });

      return card;
    }

    function getTeamById(teamId) {
      return teamsData.find(team => team.id === teamId);
    }

    function renderMatches() {
      matchesGrid.innerHTML = '';
      matchesData.forEach(match => {
        const teamA = getTeamById(match.teamAId);
        const teamB = getTeamById(match.teamBId);
        if (!teamA || !teamB) return;

        matchesGrid.appendChild(
          makeCard({
            icon: `${teamA.badge}<span class="match-vs">VS</span>${teamB.badge}`,
            iconClass: 'item-icon-wrap--match',
            chip: 'Match',
            name: `${teamA.name} vs ${teamB.name}`,
            tagline: `${match.venue} • ${match.kickoff}`,
            onActivate: () => openMatch(match.id)
          })
        );
      });
    }

    function renderTeamPanel(matchId, team, sideLabel) {
      const panel = document.createElement('div');
      panel.className = 'team-panel';

      const title = document.createElement('div');
      title.className = 'team-panel-title';
      title.textContent = `${sideLabel}: ${team.name}`;

      const subtitle = document.createElement('div');
      subtitle.className = 'team-panel-subtitle';
      subtitle.textContent = `Coach: ${team.coach} | Squad: ${team.players.length} players`;

      const list = document.createElement('div');
      list.className = 'player-list';

      team.players.forEach((player, index) => {
        const button = document.createElement('button');
        button.className = 'player-link';
        button.type = 'button';
        button.innerHTML = `
          <span class="player-link-left"><span>${player.avatar}</span><span>${player.name}</span></span>
          <span class="player-link-meta">${player.position} | #${player.jerseyNumber}</span>
        `;
        button.addEventListener('click', () => openPlayerDetail(matchId, team.id, index));
        list.appendChild(button);
      });

      panel.appendChild(title);
      panel.appendChild(subtitle);
      panel.appendChild(list);
      return panel;
    }

    function openMatch(matchId) {
      const match = matchesData.find(entry => entry.id === matchId);
      if (!match) return;

      const teamA = getTeamById(match.teamAId);
      const teamB = getTeamById(match.teamBId);
      if (!teamA || !teamB) return;

      currentMatchId = matchId;
      matchesView.hidden = true;
      detailView.hidden = true;
      matchView.hidden = false;

      matchHeading.textContent = `${teamA.name} vs ${teamB.name}`;
      matchTimeBadge.textContent = match.kickoff;
      matchMeta.innerHTML = `<strong>Venue:</strong> ${match.venue}<br><strong>Time:</strong> ${match.kickoff}`;

      matchTeamColumns.innerHTML = '';
      matchTeamColumns.appendChild(renderTeamPanel(matchId, teamA, 'Team A'));
      matchTeamColumns.appendChild(renderTeamPanel(matchId, teamB, 'Team B'));
    }

    function openPlayerDetail(matchId, teamId, playerIndex) {
      const match = matchesData.find(entry => entry.id === matchId);
      if (!match) return;

      const team = getTeamById(teamId);
      if (!team) return;

      const opponent = team.id === match.teamAId ? getTeamById(match.teamBId) : getTeamById(match.teamAId);
      const player = team.players[playerIndex];
      if (!player) return;

      matchView.hidden = true;
      detailView.hidden = false;

      detailView.innerHTML = `
        <div class="page-label">Player details</div>
        <div class="detail-layout">
          <div class="detail-top-row">
            <div class="back-link" id="back-to-match">
              <span>←</span><span>Match</span>
            </div>
            <div class="badge-soft">${team.name} vs ${opponent ? opponent.name : ''}</div>
          </div>
          <div class="detail-hero">
            <div class="detail-icon">${player.avatar}</div>
            <div>
              <div class="detail-title">${player.name}</div>
              <div class="detail-subtitle">${team.name} • ${match.kickoff}</div>
              <div class="detail-body">${player.position} profile</div>
            </div>
          </div>
          <div class="info-list">
            <div class="info-row"><strong>Name:</strong> <span>${player.name}</span></div>
            <div class="info-row"><strong>Position:</strong> <span>${player.position}</span></div>
            <div class="info-row"><strong>Favorite color:</strong> <span class="color-dot" style="background:${player.favColor};"></span><span>${player.favColor}</span></div>
            <div class="info-row"><strong>Avatar:</strong> <span>${player.avatar}</span></div>
            <div class="info-row"><strong>Matches played:</strong> <span>${player.matchesPlayed}</span></div>
            <div class="info-row"><strong>Goals scored:</strong> <span>${player.goalsScored}</span></div>
            <div class="info-row"><strong>Assists:</strong> <span>${player.assists}</span></div>
            <!-- <div class="info-row"><strong>Jersey number:</strong> <span>#${player.jerseyNumber}</span></div> -->
            <!-- <div class="info-row"><strong>Age:</strong> <span>${player.age}</span></div> -->
            <div class="info-row"><strong>Preferred foot:</strong> <span>${player.preferredFoot}</span></div>
          </div>
        </div>
      `;

      document.getElementById('back-to-match').addEventListener('click', () => {
        detailView.hidden = true;
        openMatch(match.id);
      });
    }

    document.getElementById('back-to-matches').addEventListener('click', () => {
      matchView.hidden = true;
      detailView.hidden = true;
      matchesView.hidden = false;
    });

    renderMatches();
  </script>
</body>
</html>
