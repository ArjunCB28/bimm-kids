<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Store</title>
  <style>
    :root {
      --primary-bg: #fff8ef;
      --primary-accent: #f97316;
      --primary-accent-soft: #ffedd5;
      --card-bg: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --button-bg: #22c55e;
      --button-bg-soft: #dcfce7;
      --button-text: #14532d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(251, 191, 36, 0.28), transparent 34%),
        linear-gradient(180deg, #fff7ed 0%, #fefce8 45%, #eff6ff 100%);
      color: var(--text-main);
      min-height: 100svh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 16px;
    }

    .app-shell {
      width: 100%;
      max-width: 480px;
      min-height: calc(100svh - 32px);
      background: rgba(255,255,255,0.88);
      border-radius: 24px;
      border: 1px solid rgba(251,146,60,0.25);
      box-shadow: 0 24px 60px rgba(251,146,60,0.18);
      overflow: hidden;
      backdrop-filter: blur(14px);
    }

    .app-header {
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, rgba(249,115,22,0.2), rgba(125,211,252,0.22));
      border-bottom: 1px solid rgba(251,146,60,0.2);
    }

    .app-logo {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #fee2e2, #f97316);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.65);
    }

    .app-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 10px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.65);
      box-shadow: 0 10px 24px rgba(249,115,22,0.1);
      backdrop-filter: blur(12px);
    }

    .app-title-main {
      font-weight: 900;
      letter-spacing: 0.05em;
      font-size: 24px;
      line-height: 1;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ea580c, #f59e0b 48%, #0284c7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 8px 20px rgba(249, 115, 22, 0.12);
    }

    .app-title-sub {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #475569;
    }

    .app-body {
      padding: 16px 16px 20px;
      max-height: 80vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(251,146,60,0.45) transparent;
    }

    .app-body::-webkit-scrollbar { width: 6px; }
    .app-body::-webkit-scrollbar-thumb {
      background: rgba(251,146,60,0.45);
      border-radius: 999px;
    }

    .page-label {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .page-heading {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    .item-card {
      position: relative;
      background: radial-gradient(circle at top left, rgba(255,237,213,0.9), var(--card-bg));
      border-radius: 18px;
      padding: 10px 10px 12px;
      border: 1px solid rgba(251,146,60,0.22);
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
    }

    .item-card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: radial-gradient(circle at 0 0, rgba(249,115,22,0.18), transparent 55%);
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .item-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 32px rgba(251,146,60,0.22);
      border-color: rgba(249,115,22,0.45);
    }

    .item-card:hover::before { opacity: 1; }

    .item-icon-wrap {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: radial-gradient(circle at 20% 20%, #fef3c7, var(--primary-accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin-bottom: 8px;
      box-shadow: 0 12px 22px rgba(249,115,22,0.24);
    }

    .item-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .item-tagline {
      font-size: 11px;
      color: var(--text-muted);
    }

    .item-chip {
      position: absolute;
      right: 10px;
      top: 10px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(34,197,94,0.12);
      color: #166534;
      border: 1px solid rgba(74,222,128,0.45);
    }

    .pill-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .pill {
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      border: 1px solid rgba(251,146,60,0.2);
      color: var(--text-muted);
      background: rgba(255,255,255,0.82);
    }

    .pill--accent {
      border-color: rgba(249,115,22,0.5);
      color: #c2410c;
      background: rgba(249,115,22,0.1);
    }

    .detail-layout {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .detail-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .back-link {
      font-size: 11px;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      opacity: 0.85;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid rgba(251,146,60,0.22);
      background: rgba(255,255,255,0.85);
    }

    .back-link span:first-child {
      font-size: 14px;
      transform: translateY(1px);
    }

    .badge-soft {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      background: var(--button-bg-soft);
      color: var(--button-text);
    }

    .detail-hero {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .detail-icon {
      width: 90px;
      height: 90px;
      border-radius: 28px;
      background: radial-gradient(circle at 25% 25%, #fef9c3, var(--primary-accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      box-shadow: 0 18px 35px rgba(249,115,22,0.22);
    }

    .detail-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .detail-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .detail-body {
      font-size: 13px;
      line-height: 1.5;
      color: #334155;
    }

    .detail-body-emoji {
      font-size: 16px;
      margin-right: 4px;
    }

    .order-panel {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: radial-gradient(circle at top right, rgba(16,185,129,0.16), rgba(255,255,255,0.95));
      border: 1px solid rgba(34,197,94,0.25);
    }

    .order-button {
      width: 100%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: var(--button-text);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(34,197,94,0.28);
    }

    .order-button span:first-child { font-size: 22px; }

    .order-meta {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34,197,94,0.8);
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
      70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .status-banner {
      margin-top: 14px;
      padding: 10px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px dashed rgba(34,197,94,0.4);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1f2937;
    }

    .status-icon {
      font-size: 18px;
    }

    .status-label {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 10px;
      color: var(--text-muted);
    }

    .status-main {
      font-size: 12px;
    }

    .success-section {
      margin-top: 16px;
      padding: 18px 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(220,252,231,0.95), rgba(255,255,255,0.96));
      border: 1px solid rgba(34,197,94,0.28);
      box-shadow: 0 16px 30px rgba(34,197,94,0.12);
    }

    .success-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .success-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background: linear-gradient(135deg, #22c55e, #86efac);
      box-shadow: 0 12px 24px rgba(34,197,94,0.18);
    }

    .success-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #15803d;
      margin-bottom: 4px;
    }

    .success-title {
      font-size: 22px;
      font-weight: 800;
      color: #14532d;
      line-height: 1.1;
    }

    .success-message {
      font-size: 15px;
      line-height: 1.5;
      color: #166534;
    }

    .success-order-id {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(34,197,94,0.22);
      font-size: 14px;
      color: #166534;
    }

    .success-order-id strong {
      display: block;
      margin-top: 4px;
      font-size: 20px;
      letter-spacing: 0.08em;
      color: #14532d;
    }

    .success-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(34,197,94,0.2);
      font-size: 13px;
      color: #3f6212;
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
        justify-content: stretch;
      }
      .app-shell {
        max-width: 100%;
        min-height: 100svh;
        border-radius: 0;
        border: none;
      }
      .grid { grid-template-columns: 1fr; }
      .detail-hero { gap: 10px; }
      .detail-icon { width: 80px; height: 80px; font-size: 48px; }
      .app-title-main { font-size: 26px; }
      .app-title-sub { font-size: 12px; }
      .order-button { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-logo" aria-hidden="true">🚗</div>
      <div class="app-title">
        <div class="app-title-main">BIMM Kids Garage</div>
        <div class="app-title-sub">Pick a fun ride and collect it in person</div>
      </div>
    </header>
    <main class="app-body">
      <section id="list-view" aria-label="Toy list">
        <div class="page-label">Choose your ride</div>
        <div class="page-heading">Tap a toy to order</div>
        <div class="pill-row">
          <div class="pill pill--accent">No prices – just fun</div>
          <div class="pill">Collect at the store</div>
        </div>
        <div id="items-grid" class="grid" aria-live="polite"></div>
      </section>
      <section id="detail-view" hidden aria-label="Toy details"></section>
    </main>
  </div>

  <script>
    const theme = {
      primaryBg: getComputedStyle(document.documentElement).getPropertyValue('--primary-bg'),
      accent: getComputedStyle(document.documentElement).getPropertyValue('--primary-accent')
    };

    const itemsData = [
      {
        id: 'speedster-car',
        name: 'Turbo Speedster',
        emoji: '🏎️',
        tagline: 'Super-fast mini race car',
        description: 'Zoom around the track with this turbo-charged mini race car. Perfect for kids who love speed, bright colors, and engine sounds made with their own voices!',
        funFact: 'Fun mission: can you make 3 laps around the room without crashing into any chairs?'
      },
      {
        id: 'rocket-ship',
        name: 'Cosmic Rocket',
        emoji: '🚀',
        tagline: 'Blast off into space',
        description: 'Fly to the moon, dodge silly space bananas, and visit friendly space robots. This rocket toy is ready for big imaginations.',
        funFact: 'Fun mission: count down from 10 really loudly before every launch.'
      },
      {
        id: 'monster-truck',
        name: 'Mega Monster Truck',
        emoji: '🚚',
        tagline: 'Big wheels, big jumps',
        description: 'Crunch tiny obstacles and jump over imaginary ramps. Mega Monster Truck loves bumpy roads and loud cheers.',
        funFact: 'Fun mission: build a pillow ramp and see how far your truck can jump.'
      },
      {
        id: 'hover-board',
        name: 'Neon Hover Board',
        emoji: '🛹',
        tagline: 'Glide with glowing lights',
        description: 'A pretend hover board with neon glow. Ride through your living room city and keep your balance like a pro.',
        funFact: 'Fun mission: move in slow motion like you are in space while riding.'
      }
    ];

    const listView = document.getElementById('list-view');
    const detailView = document.getElementById('detail-view');
    const itemsGrid = document.getElementById('items-grid');

    function renderList() {
      itemsGrid.innerHTML = '';
      itemsData.forEach(item => {
        const card = document.createElement('article');
        card.className = 'item-card';
        card.tabIndex = 0;
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', `Open details for ${item.name}`);
        card.innerHTML = `
          <div class="item-icon-wrap">${item.emoji}</div>
          <div class="item-chip">Tap to view</div>
          <div class="item-name">${item.name}</div>
          <div class="item-tagline">${item.tagline}</div>
        `;
        card.addEventListener('click', () => openDetail(item.id));
        card.addEventListener('keypress', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openDetail(item.id);
          }
        });
        itemsGrid.appendChild(card);
      });
    }

    function generateOrderId() {
      const randomPart = Math.floor(100000 + Math.random() * 900000);
      return `BIMM-${randomPart}`;
    }

    function openDetail(id) {
      const item = itemsData.find(x => x.id === id);
      if (!item) return;

      listView.hidden = true;
      detailView.hidden = false;

      detailView.innerHTML = `
        <div class="page-label">Toy details</div>
        <div class="detail-layout">
          <div class="detail-top-row">
            <div class="back-link" id="back-from-detail">
              <span>←</span><span>Back</span>
            </div>
            <div class="badge-soft">Collect at the store</div>
          </div>
          <div class="detail-hero">
            <div class="detail-icon">${item.emoji}</div>
            <div>
              <div class="detail-title">${item.name}</div>
              <div class="detail-subtitle">${item.tagline}</div>
              <div class="detail-body">
                <span class="detail-body-emoji">✨</span>${item.description}
              </div>
            </div>
          </div>
          <div class="order-panel" id="order-panel">
            <button class="order-button" id="order-button">
              <span>🎁</span><span>Place Order</span>
            </button>
            <div class="order-meta">
              <div class="pulse-dot"></div>
              <span>Ask a grown-up when your toy is ready.</span>
            </div>
          </div>
          <div id="status-area"></div>
        </div>
      `;

      document.getElementById('back-from-detail').addEventListener('click', () => {
        detailView.hidden = true;
        listView.hidden = false;
      });

      document.getElementById('order-button').addEventListener('click', () => {
        const orderPanel = document.getElementById('order-panel');
        const status = document.getElementById('status-area');
        const orderId = generateOrderId();

        orderPanel.hidden = true;
        status.innerHTML = `
          <section class="success-section" aria-live="polite">
            <div class="success-top">
              <div class="success-icon">✅</div>
              <div>
                <div class="success-label">Order successfully placed</div>
                <div class="success-title">${item.name} is booked for pickup</div>
              </div>
            </div>
            <div class="success-message">
              Your order has been placed successfully. Go to the store and collect it when your name is called.
            </div>
            <div class="success-order-id">
              Order ID
              <strong>${orderId}</strong>
            </div>
            <div class="success-note">Show this screen to a grown-up when it is time to pick up your toy.</div>
          </section>
        `;
      });
    }

    renderList();
  </script>
</body>
</html>
