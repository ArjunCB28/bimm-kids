<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer Player Hub</title>
  <style>
    :root {
      --primary-bg: #f2fcf5;
      --primary-accent: #4f9d69;
      --primary-accent-soft: #dcf7e5;
      --card-bg: #ffffff;
      --text-main: #1f2933;
      --text-muted: #5f7368;
      --button-bg: #4f9d69;
      --button-bg-soft: #dcf7e5;
      --button-text: #133222;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--primary-bg);
      color: var(--text-main);
      min-height: 100svh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 16px;
    }

    .app-shell {
      width: 100%;
      max-width: 480px;
      min-height: calc(100svh - 32px);
      background: #ffffff;
      border-radius: 24px;
      border: 1px solid #cfe7d7;
      box-shadow: 0 12px 28px rgba(79,157,105,0.12);
      overflow: hidden;
    }

    .app-header {
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #d9f4e1;
      border-bottom: 1px solid #b8dfc5;
    }

    .app-logo {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: #b8e7c8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.9);
    }

    .app-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 2px 0;
    }

    .app-title-main {
      font-weight: 800;
      letter-spacing: 0.03em;
      font-size: 22px;
      line-height: 1;
      text-transform: uppercase;
      color: #1d4f33;
    }

    .app-title-sub {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #436253;
    }

    .app-body {
      padding: 16px 16px 20px;
      max-height: 80vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(79,157,105,0.45) transparent;
    }

    .app-body::-webkit-scrollbar { width: 6px; }
    .app-body::-webkit-scrollbar-thumb {
      background: rgba(79,157,105,0.45);
      border-radius: 999px;
    }

    .page-label {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .page-heading {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    .item-card {
      position: relative;
      background: var(--card-bg);
      border-radius: 14px;
      padding: 10px 10px 12px;
      border: 1px solid #d6e8dd;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.14s ease, box-shadow 0.14s ease;
    }

    .item-card::before {
      content: none;
    }

    .item-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(79,157,105,0.14);
    }

    .item-card:hover::before { opacity: 0; }

    .item-icon-wrap {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      background: #ecf9f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin-bottom: 8px;
      box-shadow: none;
    }

    .item-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .item-tagline {
      font-size: 11px;
      color: var(--text-muted);
    }

    .item-chip {
      position: absolute;
      right: 10px;
      top: 10px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 4px 7px;
      border-radius: 999px;
      background: #e8f6ed;
      color: #25613f;
      border: 1px solid #cbe8d6;
    }

    .pill-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .pill {
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      border: 1px solid #cfe7d7;
      color: var(--text-muted);
      background: #f8fdf9;
    }

    .pill--accent {
      border-color: #9bcfb0;
      color: #1f5f3d;
      background: #e8f6ed;
    }

    .detail-layout {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .detail-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .back-link {
      font-size: 11px;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      opacity: 0.85;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid #cfe7d7;
      background: #f5fcf7;
    }

    .back-link span:first-child {
      font-size: 14px;
      transform: translateY(1px);
    }

    .badge-soft {
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      background: #e8f6ed;
      color: #1f5f3d;
    }

    .detail-hero {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .detail-icon {
      width: 90px;
      height: 90px;
      border-radius: 28px;
      background: #e8f6ed;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      box-shadow: none;
    }

    .detail-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .detail-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .detail-body {
      font-size: 13px;
      line-height: 1.5;
      color: #334155;
    }

    .detail-body-emoji {
      font-size: 16px;
      margin-right: 4px;
    }

    .info-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
      color: #334155;
    }

    .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #f6fbf8;
      border: 1px solid #deefe3;
    }

    .info-row strong {
      min-width: 120px;
      color: #365446;
    }

    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      border: 1px solid rgba(15,23,42,0.18);
    }

    .order-panel {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: radial-gradient(circle at top right, rgba(16,185,129,0.16), rgba(255,255,255,0.95));
      border: 1px solid rgba(34,197,94,0.25);
    }

    .order-button {
      width: 100%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: var(--button-text);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(34,197,94,0.28);
    }

    .order-button span:first-child { font-size: 22px; }

    .order-meta {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34,197,94,0.8);
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
      70% { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    .status-banner {
      margin-top: 14px;
      padding: 10px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px dashed rgba(34,197,94,0.4);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1f2937;
    }

    .status-icon {
      font-size: 18px;
    }

    .status-label {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 10px;
      color: var(--text-muted);
    }

    .status-main {
      font-size: 12px;
    }

    .success-section {
      margin-top: 16px;
      padding: 18px 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(220,252,231,0.95), rgba(255,255,255,0.96));
      border: 1px solid rgba(34,197,94,0.28);
      box-shadow: 0 16px 30px rgba(34,197,94,0.12);
    }

    .success-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .success-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      background: linear-gradient(135deg, #22c55e, #86efac);
      box-shadow: 0 12px 24px rgba(34,197,94,0.18);
    }

    .success-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #15803d;
      margin-bottom: 4px;
    }

    .success-title {
      font-size: 22px;
      font-weight: 800;
      color: #14532d;
      line-height: 1.1;
    }

    .success-message {
      font-size: 15px;
      line-height: 1.5;
      color: #166534;
    }

    .success-order-id {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(34,197,94,0.22);
      font-size: 14px;
      color: #166534;
    }

    .success-order-id strong {
      display: block;
      margin-top: 4px;
      font-size: 20px;
      letter-spacing: 0.08em;
      color: #14532d;
    }

    .success-note {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(34,197,94,0.2);
      font-size: 13px;
      color: #3f6212;
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
        justify-content: stretch;
      }
      .app-shell {
        max-width: 100%;
        min-height: 100svh;
        border-radius: 0;
        border: none;
      }
      .grid { grid-template-columns: 1fr; }
      .detail-hero { gap: 10px; }
      .detail-icon { width: 80px; height: 80px; font-size: 48px; }
      .app-title-main { font-size: 26px; }
      .app-title-sub { font-size: 12px; }
      .order-button { font-size: 17px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-logo" aria-hidden="true">⚽</div>
      <div class="app-title">
        <div class="app-title-main">BIMM Soccer</div>
        <div class="app-title-sub">Simple team and player directory</div>
      </div>
    </header>
    <main class="app-body">
      <section id="list-view" aria-label="Team list">
        <div class="page-label">Choose a team</div>
        <div class="page-heading">Tap a team to view players</div>
        <div class="pill-row">
          <div class="pill pill--accent">4 teams</div>
          <div class="pill">4 players each</div>
          <div class="pill">Local JSON configurable</div>
        </div>
        <div id="items-grid" class="grid" aria-live="polite"></div>
      </section>
      <section id="players-view" hidden aria-label="Player list">
        <div class="detail-top-row" style="margin-bottom: 10px;">
          <div class="back-link" id="back-to-teams">
            <span>←</span><span>Teams</span>
          </div>
          <div class="badge-soft" id="players-count-badge">4 players</div>
        </div>
        <div class="page-label">Team players</div>
        <div class="page-heading" id="players-heading">Select a player</div>
        <div id="players-grid" class="grid" aria-live="polite"></div>
      </section>
      <section id="detail-view" hidden aria-label="Player details"></section>
    </main>
  </div>

  <script>
    const defaultTeamsJson = [
      {
        id: 'thunder-lions',
        name: 'Inter Miami CF',
        badge: '🦁',
        players: [
          { name: 'Lionel Messi', favColor: 'Blue', avatar: '⚽', position: 'Forward', matchesPlayed: 18, goalsScored: 14, assists: 7, jerseyNumber: 9, age: 12, preferredFoot: 'Right' },
          { name: 'Manuel Neuer', favColor: 'Purple', avatar: '🥅', position: 'Goalkeeper', matchesPlayed: 20, goalsScored: 0, assists: 2, jerseyNumber: 1, age: 11, preferredFoot: 'Right' },
          { name: 'Luka Modric', favColor: 'Green', avatar: '🏃', position: 'Midfielder', matchesPlayed: 19, goalsScored: 6, assists: 11, jerseyNumber: 8, age: 12, preferredFoot: 'Left' },
          { name: 'Virgil van Dijk', favColor: 'Pink', avatar: '🧤', position: 'Defender', matchesPlayed: 17, goalsScored: 2, assists: 4, jerseyNumber: 4, age: 11, preferredFoot: 'Right' }
        ]
      },
      {
        id: 'coastal-eagles',
        name: 'Al Nassr FC',
        badge: '🦅',
        players: [
          { name: 'Cristiano Ronaldo', favColor: 'Orange', avatar: '⚽', position: 'Forward', matchesPlayed: 16, goalsScored: 12, assists: 5, jerseyNumber: 10, age: 12, preferredFoot: 'Left' },
          { name: 'Kevin De Bruyne', favColor: 'Teal', avatar: '🏃', position: 'Midfielder', matchesPlayed: 18, goalsScored: 7, assists: 9, jerseyNumber: 7, age: 11, preferredFoot: 'Right' },
          { name: 'Alisson Becker', favColor: 'Red', avatar: '🥅', position: 'Goalkeeper', matchesPlayed: 20, goalsScored: 0, assists: 1, jerseyNumber: 1, age: 12, preferredFoot: 'Right' },
          { name: 'Sergio Ramos', favColor: 'Yellow', avatar: '🧤', position: 'Defender', matchesPlayed: 17, goalsScored: 1, assists: 3, jerseyNumber: 3, age: 11, preferredFoot: 'Left' }
        ]
      },
      {
        id: 'storm-wolves',
        name: 'Real Madrid CF',
        badge: '🐺',
        players: [
          { name: 'Kylian Mbappe', favColor: 'Navy', avatar: '⚽', position: 'Forward', matchesPlayed: 19, goalsScored: 15, assists: 6, jerseyNumber: 11, age: 12, preferredFoot: 'Right' },
          { name: 'Jude Bellingham', favColor: 'Magenta', avatar: '🏃', position: 'Midfielder', matchesPlayed: 18, goalsScored: 5, assists: 10, jerseyNumber: 6, age: 11, preferredFoot: 'Left' },
          { name: 'Ederson Moraes', favColor: 'Lime', avatar: '🥅', position: 'Goalkeeper', matchesPlayed: 20, goalsScored: 0, assists: 1, jerseyNumber: 1, age: 12, preferredFoot: 'Right' },
          { name: 'Ruben Dias', favColor: 'Cyan', avatar: '🧤', position: 'Defender', matchesPlayed: 16, goalsScored: 2, assists: 2, jerseyNumber: 5, age: 11, preferredFoot: 'Right' }
        ]
      },
      {
        id: 'sunburst-tigers',
        name: 'Manchester City FC',
        badge: '🐯',
        players: [
          { name: 'Erling Haaland', favColor: 'Gold', avatar: '⚽', position: 'Forward', matchesPlayed: 17, goalsScored: 13, assists: 4, jerseyNumber: 9, age: 12, preferredFoot: 'Right' },
          { name: 'Aitana Bonmati', favColor: 'Coral', avatar: '🏃', position: 'Midfielder', matchesPlayed: 18, goalsScored: 8, assists: 8, jerseyNumber: 8, age: 11, preferredFoot: 'Left' },
          { name: 'Marc-Andre ter Stegen', favColor: 'Indigo', avatar: '🥅', position: 'Goalkeeper', matchesPlayed: 20, goalsScored: 0, assists: 0, jerseyNumber: 1, age: 12, preferredFoot: 'Right' },
          { name: 'Lucy Bronze', favColor: 'Mint', avatar: '🧤', position: 'Defender', matchesPlayed: 16, goalsScored: 1, assists: 5, jerseyNumber: 2, age: 11, preferredFoot: 'Right' }
        ]
      }
    ];

    const localConfigKey = 'soccerTeamsConfig';

    function normalizePlayer(player) {
      return {
        name: typeof player?.name === 'string' ? player.name : 'Unknown Player',
        favColor: typeof player?.favColor === 'string' ? player.favColor : 'Gray',
        avatar: typeof player?.avatar === 'string' ? player.avatar : '⚽',
        position: typeof player?.position === 'string' ? player.position : 'Midfielder',
        matchesPlayed: Number.isFinite(player?.matchesPlayed) ? player.matchesPlayed : 0,
        goalsScored: Number.isFinite(player?.goalsScored) ? player.goalsScored : 0,
        assists: Number.isFinite(player?.assists) ? player.assists : 0,
        jerseyNumber: Number.isFinite(player?.jerseyNumber) ? player.jerseyNumber : 0,
        age: Number.isFinite(player?.age) ? player.age : 0,
        preferredFoot: typeof player?.preferredFoot === 'string' ? player.preferredFoot : 'Right'
      };
    }

    function normalizeTeam(team, index) {
      const safePlayers = Array.isArray(team?.players) ? team.players.slice(0, 4).map(normalizePlayer) : [];
      return {
        id: typeof team?.id === 'string' ? team.id : `team-${index + 1}`,
        name: typeof team?.name === 'string' ? team.name : `Team ${index + 1}`,
        badge: typeof team?.badge === 'string' ? team.badge : '⚽',
        players: safePlayers
      };
    }

    function loadTeamsData() {
      try {
        const raw = localStorage.getItem(localConfigKey);
        if (!raw) return defaultTeamsJson.map(normalizeTeam);

        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) || parsed.length !== 4) return defaultTeamsJson.map(normalizeTeam);

        const hasValidTeams = parsed.every(team =>
          team &&
          typeof team.name === 'string' &&
          typeof team.badge === 'string' &&
          Array.isArray(team.players) &&
          team.players.length === 4
        );

        return hasValidTeams ? parsed.map(normalizeTeam) : defaultTeamsJson.map(normalizeTeam);
      } catch {
        return defaultTeamsJson.map(normalizeTeam);
      }
    }

    const teamsData = loadTeamsData();

    const teamsView = document.getElementById('list-view');
    const playersView = document.getElementById('players-view');
    const detailView = document.getElementById('detail-view');
    const teamsGrid = document.getElementById('items-grid');
    const playersGrid = document.getElementById('players-grid');
    const playersHeading = document.getElementById('players-heading');
    const playersCountBadge = document.getElementById('players-count-badge');

    function makeCard({ icon, chip, name, tagline, onActivate }) {
      const card = document.createElement('article');
      card.className = 'item-card';
      card.tabIndex = 0;
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', `Open details for ${name}`);
      card.innerHTML = `
        <div class="item-icon-wrap">${icon}</div>
        <div class="item-chip">${chip}</div>
        <div class="item-name">${name}</div>
        <div class="item-tagline">${tagline}</div>
      `;

      card.addEventListener('click', onActivate);
      card.addEventListener('keypress', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          onActivate();
        }
      });

      return card;
    }

    function renderTeams() {
      teamsGrid.innerHTML = '';
      teamsData.forEach(team => {
        teamsGrid.appendChild(
          makeCard({
            icon: team.badge,
            chip: 'Team',
            name: team.name,
            tagline: `${team.players.length} players`,
            onActivate: () => openPlayers(team.id)
          })
        );
      });
    }

    function openPlayers(teamId) {
      const team = teamsData.find(entry => entry.id === teamId);
      if (!team) return;

      teamsView.hidden = true;
      detailView.hidden = true;
      playersView.hidden = false;

      playersHeading.textContent = team.name;
      playersCountBadge.textContent = `${team.players.length} players`;
      playersGrid.innerHTML = '';

      team.players.forEach((player, index) => {
        playersGrid.appendChild(
          makeCard({
            icon: player.avatar,
            chip: 'Player',
            name: player.name,
            tagline: `${player.position} • Goals: ${player.goalsScored}`,
            onActivate: () => openPlayerDetail(team.id, index)
          })
        );
      });
    }

    function openPlayerDetail(teamId, playerIndex) {
      const team = teamsData.find(entry => entry.id === teamId);
      if (!team) return;

      const player = team.players[playerIndex];
      if (!player) return;

      playersView.hidden = true;
      detailView.hidden = false;

      detailView.innerHTML = `
        <div class="page-label">Player details</div>
        <div class="detail-layout">
          <div class="detail-top-row">
            <div class="back-link" id="back-to-players">
              <span>←</span><span>Players</span>
            </div>
            <div class="badge-soft">${team.name}</div>
          </div>
          <div class="detail-hero">
            <div class="detail-icon">${player.avatar}</div>
            <div>
              <div class="detail-title">${player.name}</div>
              <div class="detail-subtitle">${team.name}</div>
              <div class="detail-body">${player.position} profile</div>
            </div>
          </div>
          <div class="info-list">
            <div class="info-row"><strong>Name:</strong> <span>${player.name}</span></div>
            <div class="info-row"><strong>Position:</strong> <span>${player.position}</span></div>
            <div class="info-row"><strong>Favorite color:</strong> <span class="color-dot" style="background:${player.favColor};"></span><span>${player.favColor}</span></div>
            <div class="info-row"><strong>Avatar:</strong> <span>${player.avatar}</span></div>
            <div class="info-row"><strong>Matches played:</strong> <span>${player.matchesPlayed}</span></div>
            <div class="info-row"><strong>Goals scored:</strong> <span>${player.goalsScored}</span></div>
            <div class="info-row"><strong>Assists:</strong> <span>${player.assists}</span></div>
            <div class="info-row"><strong>Jersey number:</strong> <span>#${player.jerseyNumber}</span></div>
            <div class="info-row"><strong>Age:</strong> <span>${player.age}</span></div>
            <div class="info-row"><strong>Preferred foot:</strong> <span>${player.preferredFoot}</span></div>
          </div>
        </div>
      `;

      document.getElementById('back-to-players').addEventListener('click', () => {
        detailView.hidden = true;
        openPlayers(team.id);
      });
    }

    document.getElementById('back-to-teams').addEventListener('click', () => {
      playersView.hidden = true;
      detailView.hidden = true;
      teamsView.hidden = false;
    });

    renderTeams();
  </script>
</body>
</html>
